<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Test System - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>📚 Online Test System</h1>
            <h2>Student Login</h2>
            
            <form action="dashboard.php" method="POST" id="loginForm">
                <div class="input-group">
                    <label>Student ID</label>
                    <input type="text" name="student_id" required placeholder="Enter your Student ID">
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Enter your Password">
                </div>
                
                <button type="submit" class="btn-login">Login</button>
            </form>
            
            <div class="demo-credentials">
                <h3>Demo Credentials:</h3>
                <p>Student ID: STU001</p>
                <p>Password: test123</p>
            </div>
        </div>
    </div>
    
    <script>
        // Handle login via AJAX
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            
            fetch('authenticate.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = 'dashboard.php';
                } else {
                    alert(data.message || 'Login failed!');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
            });
        });
    </script>
</body>
</html>
